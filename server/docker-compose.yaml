version: "3.9"

services:
  mongo:
    image: mongo
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - backend

  redis:
    image: redis:7.2
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    environment:
      ENV_REDIS_PASSWORD: "redis_pass"
    networks:
      - backend
  app:
    build: .
    container_name: app
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    volumes:
      - ./.env:/data/.env
    ports:
      - "8000:8080"
    networks:
      - backend

volumes:
  mongo_data:
  mongo_config:
  redis_data:

networks:
  backend:
    driver: bridge
